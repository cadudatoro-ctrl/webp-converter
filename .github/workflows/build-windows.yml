name: Build Windows Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "WebP Converter" --collect-all customtkinter main.py

    - name: Rename executable for release
      run: |
        ren "dist\WebP Converter.exe" "WebP-Converter-Windows.exe"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Windows Build
        target_commitish: ${{ github.sha }}
        files: dist/WebP-Converter-Windows.exe
        body: |
          Automatic build of the WebP Converter for Windows 11.
          Download the `.exe` file below and run it (no installation required).
          
          *Note: Windows SmartScreen may show a warning since this is a self-published app. Click "More info" -> "Run anyway".*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
