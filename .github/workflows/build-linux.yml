name: Build Linux Executable

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk

    - name: Install python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name "WebP Converter" --collect-all customtkinter main.py

    - name: Rename executable for release
      run: |
        mv "dist/WebP Converter" "dist/WebP-Converter-Linux"

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest Linux Build
        target_commitish: ${{ github.sha }}
        files: dist/WebP-Converter-Linux
        body: |
          Automatic build of the WebP Converter for Linux (Ubuntu).
          Download the file below, make it executable (`chmod +x WebP-Converter-Linux`), and run it directly.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
